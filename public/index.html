<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Live Translator · Czech ↔ English</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">Live Translator</h1>
      <p class="subtitle">Czech ↔ English · AI-powered</p>
      <div class="mode-switch">
        <button class="mode-btn active" data-mode="listen" aria-pressed="true">
          <span class="mode-icon">👂</span>
          <span>Listen</span>
          <span class="mode-desc">Czech → English</span>
        </button>
        <button class="mode-btn" data-mode="talk" aria-pressed="false">
          <span class="mode-icon">🎤</span>
          <span>Talk</span>
          <span class="mode-desc">English → Czech</span>
        </button>
      </div>
    </header>

    <main class="main">
      <div class="subtitle-panel">
        <div class="source-label"></div>
        <p class="subtitle-text" id="subtitle">Listening...</p>
        <div class="target-label"></div>
        <button class="play-btn" id="playBtn" aria-label="Play speech" title="Play">
          <span class="play-icon">🔊</span>
          <span class="play-label">Play</span>
        </button>
      </div>

      <div class="voice-selector">
        <span class="voice-label">Voice (AI):</span>
        <div class="voice-options">
          <label class="voice-option"><input type="radio" name="voice" value="female" checked> Female</label>
          <label class="voice-option"><input type="radio" name="voice" value="male"> Male</label>
        </div>
        <label class="voice-option speak-both-opt"><input type="checkbox" id="speakBoth"> Speak both</label>
      </div>

      <div class="controls">
        <button class="ctrl-btn listen-btn" id="listenBtn" aria-label="Start listening">
          <span class="ctrl-icon"></span>
          <span class="ctrl-label">Start Listening</span>
        </button>
        <div class="status" id="status">Ready</div>
      </div>

      <div class="history" id="history"></div>
    </main>

    <footer class="footer">
      <span>Speech recognition works best in Chrome</span>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
